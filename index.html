    <!-- GDPR consent gate — synchronous, must run right after the host allowlist above and BEFORE
         every GTM/gtag/pixel block below. Reads the edge verdict cookie (emergent_geo_consent:
         "1" = consent required, "0" = not required; missing = FAIL-CLOSED, i.e. required) and the
         user's choice cookie (emergent_consent, which carries per-category grants in `cats`).
         PER-CATEGORY gate: each NON-Google script gates on host allowed AND its category's grant —
           __emergentAdvertisingAllowed (Meta/TikTok/Rewardful/PartnerStack),
           __emergentAnalyticsAllowed (VWO). These stay fully blocked until consent.
         GOOGLE tags (Consent Mode v2 BASIC / opt-in) also load only AFTER consent — withheld entirely
         until the relevant category is granted: GTM gates on __emergentGoogleTagsAllowed (host AND
         advertising consent) and the Wingman GA4 gtag on __wingmanGoogleTagsAllowed (host AND analytics
         consent). Consent Mode signals (default-denied -> per-category granted) below still govern
         storage once a tag loads. __emergentTrackingAllowed is kept as the coarse host AND (advertising
         OR analytics) signal for the gtmService dataLayer funnel.
         PRECEDENCE: an explicit stored choice OUTRANKS the verdict and is honoured in every region.
         Only a visitor with NO stored choice falls back to the verdict, so verdict "0" + no choice
         (the 99% rest-of-world case, who never saw a banner) leaves every flag byte-for-byte at
         today's values and pushes no Consent Mode calls (rest-of-world invariant preserved).
         Mirrors isCategoryAllowed/getConsentCategories in src/lib/consent/consent.ts — keep the
         readers in sync. -->
